<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expository Writing Study Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600&family=Fira+Code:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0c;
        --bg2: #111116;
        --bg3: #18181f;
        --bg4: #1e1e28;
        --border: rgba(255, 255, 255, 0.07);
        --border2: rgba(255, 255, 255, 0.12);
        --text: #e8e8f0;
        --text2: #9898b0;
        --text3: #5a5a72;
        --accent: #7c6af5;
        --accent2: #a594ff;
        --accent-glow: rgba(124, 106, 245, 0.15);
        --teal: #3dd6c8;
        --teal-dim: rgba(61, 214, 200, 0.1);
        --amber: #f5a623;
        --amber-dim: rgba(245, 166, 35, 0.1);
        --red: #f56565;
        --red-dim: rgba(245, 101, 101, 0.1);
        --green: #48bb78;
        --green-dim: rgba(72, 187, 120, 0.1);
        --font-display: "Cormorant Garamond", serif;
        --font-body: "Space Grotesk", sans-serif;
        --font-mono: "Fira Code", monospace;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 15px;
        line-height: 1.7;
        min-height: 100vh;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }
      header {
        padding: 3rem 2rem 2rem;
        border-bottom: 0.5px solid var(--border);
        position: relative;
        overflow: hidden;
      }
      header::after {
        content: "";
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 200px;
        background: radial-gradient(
          ellipse,
          rgba(124, 106, 245, 0.12) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
      }
      .site-eyebrow {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent2);
        margin-bottom: 0.75rem;
      }
      .site-title {
        font-family: var(--font-display);
        font-size: clamp(2.8rem, 6vw, 5rem);
        font-weight: 300;
        letter-spacing: -0.01em;
        line-height: 1.1;
      }
      .site-title em {
        font-style: italic;
        color: var(--accent2);
      }
      .site-desc {
        margin-top: 0.75rem;
        color: var(--text2);
        font-size: 14px;
        max-width: 500px;
        font-weight: 300;
      }
      .chapter-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 2rem;
      }
      .pill {
        padding: 6px 16px;
        border-radius: 100px;
        border: 0.5px solid var(--border2);
        background: transparent;
        color: var(--text2);
        font-family: var(--font-body);
        font-size: 12px;
        font-weight: 400;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.02em;
      }
      .pill:hover {
        border-color: var(--accent);
        color: var(--text);
        background: var(--accent-glow);
      }
      .pill.active {
        background: var(--accent-glow);
        border-color: var(--accent);
        color: var(--accent2);
        font-weight: 500;
      }
      .main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2.5rem 2rem 4rem;
      }
      .ch-header {
        margin-bottom: 2rem;
      }
      .ch-num {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .ch-title {
        font-family: var(--font-display);
        font-size: clamp(2rem, 4vw, 3.2rem);
        font-weight: 300;
        line-height: 1.15;
      }
      .ch-sub {
        color: var(--text2);
        font-size: 14px;
        margin-top: 4px;
        font-weight: 300;
      }
      .tabs {
        display: flex;
        gap: 0;
        border-bottom: 0.5px solid var(--border);
        margin-bottom: 2.5rem;
      }
      .tab-btn {
        padding: 10px 24px;
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--text3);
        font-family: var(--font-body);
        font-size: 13px;
        font-weight: 400;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.04em;
      }
      .tab-btn:hover {
        color: var(--text2);
      }
      .tab-btn.active {
        color: var(--accent2);
        border-bottom-color: var(--accent);
        font-weight: 500;
      }
      .section-block {
        margin-bottom: 2rem;
      }
      .section-label {
        font-family: var(--font-display);
        font-size: 1.35rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-label::after {
        content: "";
        flex: 1;
        height: 0.5px;
        background: var(--border);
      }
      .note-box {
        background: var(--bg2);
        border: 0.5px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        margin-bottom: 12px;
        transition: border-color 0.2s;
      }
      .note-box:hover {
        border-color: var(--border2);
      }
      .note-intro {
        color: var(--text2);
        font-size: 14px;
        margin-bottom: 10px;
        line-height: 1.75;
        font-weight: 300;
      }
      .note-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .note-list li {
        padding-left: 20px;
        position: relative;
        font-size: 14px;
        color: var(--text);
        line-height: 1.65;
      }
      .note-list li::before {
        content: "—";
        position: absolute;
        left: 0;
        color: var(--accent);
        font-size: 12px;
      }
      .note-list li strong,
      .note-list li b {
        color: var(--accent2);
        font-weight: 500;
      }
      .highlight-box {
        background: var(--accent-glow);
        border: 0.5px solid rgba(124, 106, 245, 0.25);
        border-radius: 10px;
        padding: 1rem 1.25rem;
        margin-bottom: 12px;
        font-size: 14px;
        color: var(--text);
        line-height: 1.7;
      }
      .highlight-box strong {
        color: var(--accent2);
      }
      .teal-box {
        background: var(--teal-dim);
        border: 0.5px solid rgba(61, 214, 200, 0.25);
        border-radius: 10px;
        padding: 1rem 1.25rem;
        margin-bottom: 12px;
        font-size: 14px;
        color: var(--text);
        line-height: 1.7;
      }
      .teal-box strong {
        color: var(--teal);
      }
      .amber-box {
        background: var(--amber-dim);
        border: 0.5px solid rgba(245, 166, 35, 0.25);
        border-radius: 10px;
        padding: 1rem 1.25rem;
        margin-bottom: 12px;
        font-size: 14px;
        color: var(--text);
        line-height: 1.7;
      }
      .amber-box strong {
        color: var(--amber);
      }
      .definition-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }
      .def-card {
        background: var(--bg3);
        border: 0.5px solid var(--border);
        border-radius: 10px;
        padding: 1rem 1.1rem;
      }
      .def-card .def-term {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        color: var(--teal);
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .def-card .def-text {
        font-size: 13px;
        color: var(--text2);
        line-height: 1.55;
      }
      .fallacy-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }
      .fallacy-card {
        background: var(--bg3);
        border: 0.5px solid var(--border);
        border-left: 2px solid var(--red);
        border-radius: 0 10px 10px 0;
        padding: 0.9rem 1rem;
      }
      .fallacy-name {
        font-weight: 500;
        font-size: 13px;
        color: var(--red);
        margin-bottom: 4px;
      }
      .fallacy-desc {
        font-size: 13px;
        color: var(--text2);
        line-height: 1.55;
      }
      .five-w-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 12px;
      }
      .w-card {
        background: var(--bg3);
        border: 0.5px solid var(--border);
        border-radius: 10px;
        padding: 0.9rem 1rem;
        text-align: center;
      }
      .w-letter {
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 600;
        color: var(--accent2);
        line-height: 1;
        margin-bottom: 4px;
      }
      .w-word {
        font-size: 12px;
        color: var(--text2);
      }
      .table-wrap {
        overflow-x: auto;
        margin-bottom: 12px;
        border-radius: 10px;
        border: 0.5px solid var(--border);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead tr {
        background: var(--bg3);
      }
      th {
        padding: 10px 14px;
        text-align: left;
        font-weight: 500;
        color: var(--accent2);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border-bottom: 0.5px solid var(--border);
      }
      td {
        padding: 10px 14px;
        border-bottom: 0.5px solid var(--border);
        color: var(--text);
        vertical-align: top;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }
      .word-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 12px;
      }
      .word-card {
        background: var(--bg3);
        border: 0.5px solid var(--border);
        border-radius: 10px;
        padding: 1rem 1.1rem;
      }
      .word-card-title {
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 8px;
        font-weight: 500;
      }
      .word-card.positive .word-card-title {
        color: var(--green);
      }
      .word-card.negative .word-card-title {
        color: var(--red);
      }
      .word-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .word-tag {
        font-size: 12px;
        padding: 3px 10px;
        border-radius: 100px;
        border: 0.5px solid;
      }
      .positive .word-tag {
        border-color: rgba(72, 187, 120, 0.25);
        color: var(--green);
        background: var(--green-dim);
      }
      .negative .word-tag {
        border-color: rgba(245, 101, 101, 0.25);
        color: var(--red);
        background: var(--red-dim);
      }
      .three-col {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }
      .outcome-card {
        background: var(--bg3);
        border: 0.5px solid var(--border);
        border-radius: 10px;
        padding: 1rem 1.1rem;
      }
      .outcome-card.win-win {
        border-top: 2px solid var(--green);
      }
      .outcome-card.win-lose {
        border-top: 2px solid var(--amber);
      }
      .outcome-card.lose-lose {
        border-top: 2px solid var(--red);
      }
      .outcome-title {
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 6px;
      }
      .win-win .outcome-title {
        color: var(--green);
      }
      .win-lose .outcome-title {
        color: var(--amber);
      }
      .lose-lose .outcome-title {
        color: var(--red);
      }
      .outcome-desc {
        font-size: 13px;
        color: var(--text2);
        line-height: 1.55;
      }
      .letter-demo {
        background: var(--bg2);
        border: 0.5px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 12px;
        font-family: var(--font-mono);
        font-size: 11.5px;
        line-height: 2;
        color: var(--text2);
        white-space: pre-wrap;
        overflow-x: auto;
      }
      .lbl {
        color: var(--accent);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .val {
        color: var(--text);
      }
      .score-strip {
        background: var(--bg3);
        border: 0.5px solid var(--border);
        border-radius: 10px;
        padding: 12px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 1.5rem;
        font-size: 14px;
        flex-wrap: wrap;
      }
      .score-label {
        color: var(--text2);
      }
      .score-val {
        font-weight: 500;
        color: var(--text);
      }
      .score-badge {
        margin-left: auto;
        padding: 3px 12px;
        border-radius: 100px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.05em;
      }
      .badge-great {
        background: var(--green-dim);
        color: var(--green);
        border: 0.5px solid rgba(72, 187, 120, 0.3);
      }
      .badge-ok {
        background: var(--amber-dim);
        color: var(--amber);
        border: 0.5px solid rgba(245, 166, 35, 0.3);
      }
      .badge-low {
        background: var(--red-dim);
        color: var(--red);
        border: 0.5px solid rgba(245, 101, 101, 0.3);
      }
      .retry-btn {
        margin-left: 8px;
        padding: 4px 14px;
        border-radius: 100px;
        border: 0.5px solid var(--border2);
        background: transparent;
        color: var(--text2);
        font-family: var(--font-body);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .retry-btn:hover {
        border-color: var(--accent);
        color: var(--accent2);
      }
      .q-block {
        background: var(--bg2);
        border: 0.5px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 14px;
        transition: border-color 0.2s;
      }
      .q-block:hover {
        border-color: var(--border2);
      }
      .q-num {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.15em;
        color: var(--text3);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .q-text {
        font-size: 15px;
        font-weight: 400;
        color: var(--text);
        line-height: 1.6;
        margin-bottom: 14px;
      }
      .options {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .opt-btn {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 10px 14px;
        background: var(--bg3);
        border: 0.5px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
        color: var(--text);
        font-family: var(--font-body);
        font-size: 13px;
        line-height: 1.55;
        transition: all 0.15s;
        width: 100%;
      }
      .opt-btn:hover:not(:disabled) {
        border-color: var(--accent);
        background: var(--accent-glow);
      }
      .opt-btn:disabled {
        cursor: default;
      }
      .opt-letter {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text3);
        min-width: 18px;
        padding-top: 1px;
        font-weight: 300;
      }
      .opt-btn.correct {
        background: var(--green-dim);
        border-color: rgba(72, 187, 120, 0.4);
      }
      .opt-btn.correct .opt-letter {
        color: var(--green);
      }
      .opt-btn.wrong {
        background: var(--red-dim);
        border-color: rgba(245, 101, 101, 0.35);
      }
      .opt-btn.wrong .opt-letter {
        color: var(--red);
      }
      .opt-btn.reveal {
        background: var(--green-dim);
        border-color: rgba(72, 187, 120, 0.4);
      }
      .opt-btn.reveal .opt-letter {
        color: var(--green);
      }
      .explain {
        margin-top: 12px;
        padding: 10px 14px;
        background: var(--bg4);
        border-left: 2px solid var(--accent);
        border-radius: 0 8px 8px 0;
        font-size: 13px;
        color: var(--text2);
        line-height: 1.65;
      }
      .cw {
        color: var(--green);
        font-weight: 500;
      }
      .ww {
        color: var(--red);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="site-eyebrow">EW 101 · Exam Preparation</div>
        <h1 class="site-title">Expository <em>Writing</em><br />Study Hub</h1>
        <p class="site-desc"></p>
        <div class="chapter-pills" id="chapterPills"></div>
      </div>
    </header>
    <main class="main" id="mainContent"></main>
    <script>
      const META = [
        {
          num: "Chapter 01",
          title: "The 7Cs — Completeness & Correctness",
          sub: "Foundational principles of effective business communication",
        },
        {
          num: "Chapter 02",
          title: "Persuasive Messages",
          sub: "Aristotle's triangle, Monroe's sequence, fallacies & behavioural economics",
        },
        {
          num: "Chapter 03",
          title: "Product Review Writing",
          sub: "Paul Barrs 11-step template, GCSE structure & credibility",
        },
        {
          num: "Chapter 04",
          title: "Block Letter Format",
          sub: "All 17 elements, exact spacing rules & punctuation conventions",
        },
        {
          num: "Chapter 05",
          title: "Negotiation Skills",
          sub: "Outcomes, BATNA/WATNA, 4-step process & ethical negotiation",
        },
        {
          num: "Chapter 06",
          title: "Employment Interviews",
          sub: "Types, stages, post-interview messages & application letters",
        },
      ];
      const QS = [
        [
          {
            q: "A business message is 'complete' when:",
            opts: [
              "It is as short as possible.",
              "It contains all the facts the reader needs for the desired reaction.",
              "It follows all formal grammar rules.",
              "It is sent through the most expensive channel.",
            ],
            ans: 1,
            ex: "Completeness ensures the receiver has all facts needed to respond or act.",
          },
          {
            q: "Which method is recommended to ensure all necessary information is provided?",
            opts: [
              "The Five W's (who, what, when, where, why)",
              "The Seven C's framework",
              "The Three-Step revision process",
              "The Active-Passive voice check",
            ],
            ans: 0,
            ex: "The Five W's (+How) is the recommended completeness checklist.",
          },
          {
            q: "What is the primary risk of ignoring questions in a business reply?",
            opts: [
              "It makes the message more concise.",
              "The reader may think you are dishonest, hiding a weakness, or unfriendly.",
              "It is considered standard professional practice.",
              "It ensures the conversation remains formal.",
            ],
            ans: 1,
            ex: "Unanswered questions signal dishonesty or unfriendliness — damaging goodwill.",
          },
          {
            q: "What should you do if an inquiry is so poorly written you cannot answer it?",
            opts: [
              "Write back asking them to rewrite it.",
              "Provide a form or list of questions for the inquirer to fill out.",
              "Ignore it until they realize their mistake.",
              "Guess the most likely intent.",
            ],
            ans: 1,
            ex: "Sending a structured form or list of questions is more professional and efficient.",
          },
          {
            q: "Which is NOT a direct benefit of complete communication?",
            opts: [
              "Building goodwill",
              "Helping avert costly lawsuits",
              "Ensuring the communicator sounds more extroverted",
              "Achieving results without follow-up messages",
            ],
            ans: 2,
            ex: "Extroversion is a source credibility factor, not a benefit of completeness.",
          },
          {
            q: "What is the primary difference between 'imply' and 'infer'?",
            opts: [
              "The writer implies; the reader infers.",
              "The reader implies; the writer infers.",
              "Imply is for facts; infer is for opinions.",
              "They are exact synonyms.",
            ],
            ans: 0,
            ex: "Writers imply. Readers infer — they draw conclusions from what they read.",
          },
          {
            q: "When should you use 'among' instead of 'between'?",
            opts: [
              "When referring to three or more people or items.",
              "When items are being compared for a final decision.",
              "When people are from different departments.",
              "When you want to sound more formal.",
            ],
            ans: 0,
            ex: "'Between' = two items. 'Among' = three or more items.",
          },
          {
            q: "In the context of source credibility, 'Competence' refers to:",
            opts: [
              "Whether the sender is likeable.",
              "Whether the sender is calm under stress.",
              "Whether the sender is perceived as knowledgeable about their subject matter.",
              "Whether the sender is honest.",
            ],
            ans: 2,
            ex: "Competence = knowledge. Composure = calm. Sociability = likeable. Character = honest.",

<div class="section-block"><div class="section-label">Completeness — Definition & Why It Matters</div>
<div class="note-box"><div class="note-intro">A message is <strong style="color:var(--accent2)">complete</strong> when it contains all the facts the receiver needs to take the desired action or respond appropriately.</div>
<ul class="note-list">
<li><b>Efficiency:</b> Complete messages achieve results without costly follow-up correspondence.</li>
<li><b>Building Goodwill:</b> Providing all necessary information shows concern for the receiver's needs.</li>
<li><b>Risk Management:</b> Incomplete messages can lead to costly misunderstandings or even lawsuits.</li>

</ul></div></div>

<div class="section-block"><div class="section-label">3 Core Rules for Completeness</div>
<div class="note-box"><ul class="note-list">

<div class="note-intro" style="color:var(--text2);font-size:14px;margin-bottom:12px">When ordering merchandise: specify <em>what</em> you want, <em>when</em> you need it, <em>who</em> it is for, <em>where</em> to send it, and <em>how</em> payment will be made.</div>

<div class="section-block"><div class="section-label">Rule 2 — Answer ALL Questions Asked</div>

<div class="section-block"><div class="section-label">What is Persuasion?</div>
<div class="highlight-box">Persuasion is <strong>almost universal in business communications</strong>. Even giving people information is a form of persuasion. Effective persuasion rests on three pillars: <strong>accurate logic</strong>, <strong>effective emotional appeal</strong>, and <strong>credibility/trust</strong>.</div>

<div class="section-block"><div class="section-label">The 11-Step Review Template (Paul Barrs)</div>
<div class="note-box"><ul class="note-list">
<li><b>1. Know the target reader</b> — Understand your readership before writing. Research the market if entering a new niche.</li>
<li><b>2. Title</b> — Format: <em>"Product Name: Product Review by [your qualifications]."</em> Qualifications help readers identify with you. Aids SEO and article directories.</li>
<li><b>3. Product Specifics</b> — Name of product + URL link.</li>
<li><b>4. Type of product</b> — Is it a video, eBook, physical item, software? If affiliate link is "hinky" (ugly/long), use HTML to mask it OR be transparent: label it as your affiliate link. Honesty sells.</li>
<li><b>5. What does the sales copy promise?</b> — Over 80% of visitors to a sales page will not read most of it. Summarize the promises in <em>3–4 bullet points</em>. This builds your credibility.</li>
<li><b>6. Does it deliver? [MOST IMPORTANT SECTION]</b> — Do not exaggerate. Give reasons, examples, draw from personal experience. Limit to 3 paragraphs.</li>
<li><b>7. Cost &amp; payment</b> — State total investment, hidden or ongoing costs, and how payment is made. Keep to one or two lines.</li>
<li><b>8. How easy is it to use?</b> — Discuss the interface, language, format. Easy to navigate?</li>
<li><b>9. How easy is it to learn?</b> — For video courses: Is the speaker clear? Is the information applicable in real life?</li>
<li><b>10. How long to get results?</b> — Highly subjective. Be honest that individual results vary. Avoid generic promises. Acknowledge risk of buyer's remorse.</li>
<li><b>11. The Good, the Bad, the Ugly (Summary)</b> — State what you loved, liked, and genuinely did not like. Be honest at all times.</li>

        document.getElementById("chapterPills").innerHTML = META.map(
          (m, i) => `
    <button class="pill${i === activeChapter ? " active" : ""}" onclick="switchChapter(${i})">${m.title}</button>`,
        ).join("");
      }

      function renderMain() {
        const m = META[activeChapter],
          qs = QS[activeChapter];
        const done = Object.keys(answers).length;
        const pct =
          done === qs.length && qs.length > 0
            ? Math.round((scoreCorrect / qs.length) * 100)
            : null;
        let html = `<div class="ch-header"><div class="ch-num">${m.num}</div><h2 class="ch-title">${m.title}</h2><div class="ch-sub">${m.sub}</div></div>`;
        html += `<div class="tabs">
    <button class="tab-btn${activeTab === "notes" ? " active" : ""}" onclick="switchTab('notes')">Notes</button>
    <button class="tab-btn${activeTab === "quiz" ? " active" : ""}" onclick="switchTab('quiz')">Practice Questions (${qs.length})</button>
  </div>`;
        if (activeTab === "notes") {
          html += NOTES_FNS[activeChapter]();
        } else {
          if (pct !== null) {
            const bc =
              pct >= 80 ? "badge-great" : pct >= 60 ? "badge-ok" : "badge-low";
            const bt =
              pct >= 80
                ? "🔥 Exam Ready!"
                : pct >= 60
                  ? "Keep grinding"
                  : "Review notes";
            html += `<div class="score-strip"><span class="score-label">Score</span><span class="score-val">${scoreCorrect} / ${qs.length} — ${pct}%</span><span class="score-badge ${bc}">${bt}</span><button class="retry-btn" onclick="resetQuiz()">↺ Retry</button></div>`;
          }
          html += qs.map((q, qi) => renderQ(q, qi)).join("");
        }
        document.getElementById("mainContent").innerHTML = html;
        renderPills();
      }

      function renderQ(q, qi) {
        const ch = answers[qi];
        const L = ["A", "B", "C", "D"];
        let opts = q.opts
          .map((o, oi) => {
            let cls = "opt-btn";
            if (ch !== undefined) {
              if (oi === q.ans) cls += " reveal";
              else if (oi === ch) cls += " wrong";
            }
            return `<button class="${cls}" onclick="answer(${qi},${oi})" ${ch !== undefined ? "disabled" : ""}><span class="opt-letter">${L[oi]}</span><span>${o}</span></button>`;
          })
          .join("");
        let exp = "";
        if (ch !== undefined) {
          const ok = ch === q.ans;
          exp = `<div class="explain"><span class="${ok ? "cw" : "ww"}">${ok ? "Correct." : "Incorrect."}</span> ${q.ex}</div>`;
        }
        return `<div class="q-block"><div class="q-num">Question ${qi + 1} of ${QS[activeChapter].length}</div><div class="q-text">${q.q}</div><div class="options">${opts}</div>${exp}</div>`;
      }

      function answer(qi, oi) {
        if (answers[qi] !== undefined) return;
        answers[qi] = oi;
        if (oi === QS[activeChapter][qi].ans) scoreCorrect++;
        renderMain();
      }

      function resetQuiz() {
        answers = {};
        scoreCorrect = 0;
        renderMain();
      }
      function switchTab(t) {
        activeTab = t;
        answers = {};
        scoreCorrect = 0;
        renderMain();
      }
      function switchChapter(i) {
        activeChapter = i;
        activeTab = "notes";
        answers = {};
        scoreCorrect = 0;
        renderMain();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      renderPills();
      renderMain();
    </script>
  </body>
</html>
